<!DOCTYPE html>
<html>
<head>
<title>UNIT MATRIC HIGH SCHOOL</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="font-family:Arial;background:#f4f8ff;text-align:center;">

<h1 style="color:#003399;">UNIT MATRIC HIGH SCHOOL</h1>
  <img src="images/logo.png" width="120" alt="UNIT MATRIC HIGH SCHOOL Logo">
<p>📍 Nachipalayam, Coimbatore</p>
<h3>Parent Feedback Portal</h3>
<p><b>Please rate and share your valuable feedback.</b></p>
  
<hr>

<p><b>Parent Name</b></p>
<input type="text" id="parent" placeholder="Enter Parent Name">
<p><b>Student Name</b></p>
<input type="text" id="student" placeholder="Enter Student Name">

<p><b>Class</b></p>
<select id="class">
  <option>Select Class</option>
  <option>LKG</option>
  <option>UKG</option>
  <option>I</option>
  <option>II</option>
  <option>III</option>
  <option>IV</option>
  <option>V</option>
  <option>VI</option>
  <option>VII</option>
  <option>VIII</option>
  <option>IX</option>
  <option>X</option>
  <option>XI</option>
  <option>XII</option>
</select>

<p><b>Rate Today's Meeting</b></p>
<div style="font-size:30px;">
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>


<br><br>


<p><b>Your Valuable Feedback</b></p>

<textarea id="feedback" rows="8" cols="35" placeholder="Please share your suggestions or feedback..."></textarea>

<br><br>
  
  <button onclick="submitFeedback()">Submit</button>
</button>
<script src="script.js"></script>
</body>
</html>
