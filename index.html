<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIT MATRIC HIGH SCHOOL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="1775634955967.png" class="logo">

<h1>UNIT MATRIC HIGH SCHOOL</h1>
<p class="address">📍 Nachipalayam, Coimbatore</p>

<h2>Parent Feedback Portal</h2>

<label>Parent Name</label>
<input type="text" id="parent" placeholder="Enter Parent Name">

<label>Student Name</label>
<input type="text" id="student" placeholder="Enter Student Name">

<label>Class</label>
<select id="class">
<option>Select Class</option>
<option>LKG</option>
<option>UKG</option>
<option>I</option>
<option>II</option>
<option>III</option>
<option>IV</option>
<option>V</option>
<option>VI</option>
<option>VII</option>
<option>VIII</option>
<option>IX</option>
<option>X</option>
<option>XI</option>
<option>XII</option>
</select>

<label>Rate Today's Meeting</label>

<div class="stars">

<span id="s1" onclick="rate(1)">☆</span>
<span id="s2" onclick="rate(2)">☆</span>
<span id="s3" onclick="rate(3)">☆</span>
<span id="s4" onclick="rate(4)">☆</span>
<span id="s5" onclick="rate(5)">☆</span>

</div>

<label>Your Valuable Feedback</label>

<textarea id="feedback" placeholder="Write your feedback here..."></textarea>

<button onclick="submitFeedback()">Submit</button>

</div>

<script src="script.js"></script>

</body>
</html>
